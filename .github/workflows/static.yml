name: CI/CD Java to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build, test, checkstyle and generate site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Build, test and run Checkstyle
        run: mvn -B clean verify

      - name: Generate static HTML with Java
        run: mvn -B exec:java

      - name: Generate Checkstyle HTML report
        run: |
          mvn -B checkstyle:checkstyle
          cp target/reports/checkstyle.html output/checkstyle.html

      - name: Verify generated site
        run: |
          test -f output/index.html
          test -f output/checkstyle.html
          grep "Hello from Java CI/CD!" output/index.html
          grep "Checkstyle" output/checkstyle.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "output"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4